<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Tech Interview Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/go/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ⭐️ 1. 다크/라이트 모드를 위한 CSS 변수 (디자인 토큰) */
        :root {
            --bg-color: #0f111a;
            --glass-bg: rgba(26, 28, 37, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --ai-bubble: rgba(40, 44, 52, 0.8);
            --ai-text: #e2e8f0;
            --user-bubble: #82aaff;
            --user-text: #0f111a;
            --editor-bg: #1e212b;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body.light-mode {
            --bg-color: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --ai-bubble: #ffffff;
            --ai-text: #1e293b;
            --user-bubble: #3b82f6;
            --user-text: #ffffff;
            --editor-bg: #ffffff;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        /* ⭐️ 2. 기본 레이아웃 & 폰트 */
        body { 
            font-family: 'Pretendard Variable', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* ⭐️ 3. 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* 글래스모피즘 패널 */
        #chat-section { 
            width: 400px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); /* 블러 효과 */
            border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; z-index: 10;
        }
        
        #editor-section { flex: 1; display: flex; flex-direction: column; background: var(--editor-bg); transition: background 0.3s; }
        
        /* 헤더 & 토글 버튼 */
        .header { 
            padding: 20px; border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; font-weight: 700; 
        }
        .theme-toggle {
            background: none; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: 0.2s;
        }
        .theme-toggle:hover { background: var(--text-main); color: var(--bg-color); }

        /* ⭐️ 4. 메시지 버블 (Message Bubbles) */
        #chat-log { 
            flex: 1; overflow-y: auto; padding: 20px; min-height: 0; 
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .bubble {
            max-width: 85%; padding: 12px 16px; border-radius: 16px; 
            font-size: 0.95em; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bubble.ai { 
            background: var(--ai-bubble); color: var(--ai-text); 
            align-self: flex-start; border-bottom-left-radius: 4px; 
            border: 1px solid var(--border-color);
        }
        .bubble.user { 
            background: var(--user-bubble); color: var(--user-text); 
            align-self: flex-end; border-bottom-right-radius: 4px; 
        }

        /* 입력창 영역 */
        .input-area { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--glass-bg); }
        #chat-input { 
            flex: 1; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); 
            padding: 12px; border-radius: 8px; outline: none; transition: 0.2s; font-family: inherit;
        }
        #chat-input:focus { border-color: var(--user-bubble); box-shadow: 0 0 0 2px rgba(130, 170, 255, 0.2); }
        #send-btn { 
            background: var(--user-bubble); color: var(--user-text); border: none; 
            padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        #send-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* 에디터 커스텀 */
        .editor-header { padding: 12px 20px; border-bottom: 1px solid var(--border-color); font-size: 0.85em; color: var(--text-muted); display: flex; justify-content: space-between; }
        .CodeMirror { height: 100%; font-family: 'Fira Code', 'D2Coding', monospace; font-size: 15px; background: transparent !important; color: var(--text-main) !important; }
        .CodeMirror-gutters { background: transparent !important; border-right: 1px solid var(--border-color) !important; }
    </style>
</head>
<body>

    <div id="chat-section">
        <div class="header">
            <span>🤖 AI Interviewer</span>
            <div style="display: flex; gap: 8px;">
                <button class="theme-toggle" id="invite-btn" style="background: #10b981; color: white; border: none;">🔗 초대하기</button>
                <button class="theme-toggle" id="finish-btn" style="background: var(--user-bubble); color: var(--user-text); border: none;">🏁 면접 종료</button>
                <button class="theme-toggle" id="theme-btn">☀️ Light</button>
            </div>
        </div>
        <div id="chat-log">
            <div class="bubble ai">환영합니다! 우측에 코드를 작성하고 질문을 남겨주세요.</div>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="이 코드의 시간 복잡도는?" autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div id="editor-section">
        <div class="editor-header">
            <span>workspace.go (Shared)</span>
            <span id="sync-status" style="color: #4ade80;">● Online</span>
        </div>
        <div id="code-editor-container" style="flex: 1; min-height: 0;"></div>
    </div>

    <script>
        // 1. 테마 토글 로직
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeBtn.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '☀️ Light';
        });

        // 2. CodeMirror 초기화
        const editor = CodeMirror(document.getElementById('code-editor-container'), {
            value: "// 실시간 코딩 테스트 워크스페이스입니다.\nfunc main() {\n    \n}",
            mode: "text/x-go", theme: "material-darker", lineNumbers: true, indentUnit: 4, tabSize: 4, lineWrapping: true
        });

        // 3. 웹소켓 동시 편집
        const ws = new WebSocket('ws://' + window.location.host + '/ws');
        let isReceiving = false;
        ws.onmessage = (event) => {
            // 내가 치고 있는 코드와 서버에서 온 코드가 다를 때만 덮어씌움 (드래그 풀림 방지)
            if (editor.getValue() !== event.data) {
                isReceiving = true;
                const cursor = editor.getCursor();
                editor.setValue(event.data);
                editor.setCursor(cursor);
                isReceiving = false;
            }
        };
        editor.on('change', () => { if (!isReceiving) ws.send(editor.getValue()); });

        // 4. AI 스트리밍 & 버블 채팅 로직 개편
        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // 채팅 버블을 화면에 추가하는 헬퍼 함수
        function appendBubble(text, sender) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerHTML = text;
            chatLog.appendChild(bubble);
            chatLog.scrollTop = chatLog.scrollHeight;
            return bubble; // 생성된 버블 객체를 반환 (나중에 텍스트를 스트리밍해서 이어붙이기 위함)
        }

        sendBtn.addEventListener('click', async () => {
            const question = chatInput.value.trim();
            const currentCode = editor.getValue();
            if (!question) return;

            // 내가 보낸 질문(파란색 버블) 추가
            appendBubble(question, 'user');
            chatInput.value = '';

            // AI가 답변을 작성할 빈 버블(회색 버블) 미리 생성
            const aiBubble = appendBubble('<span style="opacity:0.5;">타이핑 중...</span>', 'ai');
            let isFirstChunk = true; // 첫 글자가 들어올 때 '타이핑 중...' 지우기

            try {
                const response = await fetch('/ask/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, code: currentCode })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                let fullAiText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            if (isFirstChunk) { aiBubble.innerHTML = ''; isFirstChunk = false; }
                            let textChunk = line.substring(6).replace(/<br>/g, '\n');
                            fullAiText += textChunk;
                            aiBubble.innerHTML = marked.parse(fullAiText);
                            chatLog.scrollTop = chatLog.scrollHeight;
                        }
                    });
                }
            } catch (error) { console.error(error); aiBubble.innerHTML = "네트워크 에러가 발생했습니다."; }
        });

        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

        // 5. 면접 종료 및 리포트 생성 로직
        const finishBtn = document.getElementById('finish-btn');
        
        finishBtn.addEventListener('click', async () => {
            // 1) 클릭 방지 및 로딩 UI 처리
            finishBtn.innerText = '⏳ 리포트 생성 중...';
            finishBtn.disabled = true;
            finishBtn.style.opacity = '0.7';

            // 2) 현재 작성된 코드 가져오기
            const finalCode = editor.getValue();

            // 3) 화면에 있는 채팅 내역(버블) 텍스트로 긁어모으기
            let chatLogText = "";
            document.querySelectorAll('.bubble').forEach(bubble => {
                const sender = bubble.classList.contains('ai') ? "AI 면접관" : "지원자";
                chatLogText += `[${sender}]: ${bubble.innerText}\n\n`;
            });

            try {
                // 4) 백엔드(GenerateReportHandler)에 데이터 전송
                const response = await fetch('/report/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: finalCode, chat_log: chatLogText })
                });

                if (!response.ok) throw new Error('서버 에러');

                const data = await response.json();
                
                // 5) 성공적으로 ID를 받았다면, 리포트 페이지로 이동
                if (data.id) {
                    window.location.href = `/report?id=${data.id}`;
                }
            } catch (error) {
                console.error(error);
                alert('리포트 생성에 실패했습니다.');
                finishBtn.innerText = '🏁 면접 종료';
                finishBtn.disabled = false;
                finishBtn.style.opacity = '1';
            }
        });

        // 6. 초대 링크 생성 및 즉시 복사 로직
        const inviteBtn = document.getElementById('invite-btn');

        inviteBtn.addEventListener('click', () => {
            // 1. 프론트엔드에서 즉시 5자리 난수 생성
            const shortID = Math.random().toString(36).substring(2, 7);
            const shortUrl = `${window.location.origin}/r/${shortID}`;

            // 2. 브라우저 호환성을 위한 클립보드 복사 함수 (동기적 실행)
            const copyToClipboard = () => {
                if (navigator.clipboard && window.isSecureContext) {
                    return navigator.clipboard.writeText(shortUrl);
                } else {
                    return new Promise((resolve, reject) => {
                        try {
                            const textArea = document.createElement("textarea");
                            textArea.value = shortUrl;
                            textArea.style.position = "fixed";
                            textArea.style.opacity = "0";
                            document.body.appendChild(textArea);
                            textArea.focus();
                            textArea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textArea);
                            resolve();
                        } catch (e) { reject(e); }
                    });
                }
            };

            // 3. 생성 즉시 복사 실행
            copyToClipboard().then(() => {
                
                // 4. 복사가 완료된 후, UI를 업데이트하고 서버에 비동기로 통보
                const originalText = inviteBtn.innerHTML;
                inviteBtn.innerHTML = '✅ 복사 완료!';
                setTimeout(() => { inviteBtn.innerHTML = originalText; }, 2000);

                fetch('/api/invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shortId: shortID })
                });

            }).catch(err => {
                console.error('클립보드 에러:', err);
                alert('복사 권한이 차단되었습니다. 수동으로 복사해주세요: ' + shortUrl);
            });
        });
    </script>
</body>
</html>
